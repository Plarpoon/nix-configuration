name: nix language checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake
        run: nix flake check

      - name: Lint with statix
        run: nix shell nixpkgs#statix -c statix check .

  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: .#nixosConfigurations.daisy.config.system.build.toplevel
          - os: macos-latest
            target: .#darwinConfigurations.bunnybook_air.config.system.build.toplevel
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build
        run: nix build ${{ matrix.target }} --dry-run
